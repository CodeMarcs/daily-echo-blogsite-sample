<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Echo | Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<div class="auth-page">
    <div class="auth-card">

        <div class="auth-brand"><i class="fa-brands fa-leanpub"></i> Daily Echo</div>
            <h2>Create your account</h2>
                <p class="subtitle">Join the community and start sharing</p>

        <form action="login.html">
            <div class="field">
                <label for="reg-name">Full name</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="reg-name" placeholder="e.g. Janners Panners" required>
                    </div>
            </div>

            <div class="field">
                <label for="reg-username">Username</label>
                <div class="input-wrap">
                <i class="fa-solid fa-at"></i>
                <input type="text" id="reg-username" placeholder="e.g. janners" required>
                </div>
            </div>

            <div class="field">
                <label for="reg-email">Email</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="you@example.com" required>
                    </div>
            </div>

        <div class="field">
                <label for="reg-password">Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Create a password" required>
                        <button type="button" class="toggle-pass" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
                    </div>
        </div>

        <div class="form-meta">
                <label class="checkbox-label">
                    <input type="checkbox" required> I agree to the <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
                </label>
        </div>

        <button type="submit" class="btn btn-block">Sign Up</button>
        
        </form>

        <div class="divider">or sign up with</div>

        <div class="social-row">
            <button class="social-btn"><i class="fa-brands fa-google"></i> Google</button>
            <button class="social-btn"><i class="fa-brands fa-github"></i> GitHub</button>
        </div>

        <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
        </div>

    </div>
</div>

<script src="main.js"></script>
</body>
</html>
