<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Echo | Log In</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand"><i class="fa-brands fa-leanpub"></i> Daily Echo</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Log in to continue to your feed</p>

    <form action="index.html">
      <div class="field">
        <label for="login-email">Email or username</label>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope"></i>
          <input type="text" id="login-email" placeholder="e.g. kisha" required>
        </div>
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-password" placeholder="Enter your password" required>
          <button type="button" class="toggle-pass" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <div class="form-meta">
        <label class="checkbox-label">
          <input type="checkbox"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-block">Log In</button>
    </form>

    <div class="divider">or continue with</div>
    <div class="social-row">
      <button class="social-btn"><i class="fa-brands fa-google"></i> Google</button>
      <button class="social-btn"><i class="fa-brands fa-github"></i> GitHub</button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
